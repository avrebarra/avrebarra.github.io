---
layout: page
title: All Posts
permalink: /posts/
---

<script>
  function normalizeSeriesValue(value) {
    return (value || '')
      .toString()
      .trim()
      .toLowerCase()
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  function showSeries(series, options) {
    const normalizedSeries = normalizeSeriesValue(series) || 'all';
    const articles = document.querySelectorAll('.article');
    const dropdown = document.querySelector('[data-series-dropdown]');
    let activeSeries = normalizedSeries;

    if (dropdown) {
      const hasOption = Array.from(dropdown.options).some(option => {
        return normalizeSeriesValue(option.value) === normalizedSeries;
      });

      activeSeries = hasOption ? normalizedSeries : 'all';
      dropdown.value = activeSeries;
    }

    articles.forEach(article => {
      const articleSeries = normalizeSeriesValue(article.getAttribute('data-series'));

      if (activeSeries === 'all' || articleSeries === activeSeries) {
        article.classList.remove('hidden');
      } else {
        article.classList.add('hidden');
      }
    });

    const shouldPushHistory = !(options && options.pushHistory === false);
    if (!shouldPushHistory) {
      return;
    }

    const url = new URL(window.location.href);
    if (activeSeries === 'all') {
      url.searchParams.delete('series');
    } else {
      url.searchParams.set('series', activeSeries);
    }

    history.pushState({ path: url.href }, '', url.href);
  }

  document.addEventListener('DOMContentLoaded', function () {
    const dropdown = document.querySelector('[data-series-dropdown]');
    if (dropdown) {
      dropdown.addEventListener('change', function () {
        showSeries(dropdown.value || 'all');
      });
    }

    const seriesParam = new URLSearchParams(window.location.search).get('series') || 'all';
    showSeries(seriesParam, { pushHistory: false });

    window.addEventListener('popstate', function () {
      const nextSeries = new URLSearchParams(window.location.search).get('series') || 'all';
      showSeries(nextSeries, { pushHistory: false });
    });
  });
</script>

{% assign seriesList = site.posts | map: "series" | uniq %}

<div id="home" class="content mt-4">
  <div class="series-filter">
    <label class="series-filter__label utility-label normal-case tracking-normal text-gray-800"
      for="series-filter-dropdown">Series</label>
    <div class="series-filter__select-wrap">
      <select id="series-filter-dropdown" class="series-filter__select" data-series-dropdown>
        <option value="all">All</option>
        {% for series in seriesList %}
        {% if series and series != "" %}
        <option value="{{ series | slugify }}">{{ series }}</option>
        {% endif %}
        {% endfor %}
      </select>
      <span class="series-filter__chevron" aria-hidden="true">▾</span>
    </div>
  </div>

  <div class="post-list mt-8">
    {% for post in site.posts %}
    <div class="post-row article" data-series="{{ post.series | slugify }}">
      <div class="post-date">{{ post.date | date: "%m-%d-%Y" }}</div>
      <div class="post-title overflow-hidden whitespace-nowrap">
        <a href="{{ post.url }}" class="block overflow-hidden whitespace-nowrap overflow-ellipsis text-gray-900">{{
          post.title }}</a>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
