---
layout: page
title: All Posts
permalink: /posts/
---

<script>
  function showSeries(series) {
    const articles = document.querySelectorAll('.article');
    const buttons = document.querySelectorAll('.series-button');

    buttons.forEach(button => {
      if (button.getAttribute('data-series').toLowerCase() === series.toLowerCase()) {
        button.classList.add('text-gray-900');
      } else {
        button.classList.remove('text-gray-900');
      }
    });

    articles.forEach(article => {
      if (series === 'all' || article.getAttribute('series').toLowerCase() === series.toLowerCase()) {
        article.classList.remove('hidden');
      } else {
        article.classList.add('hidden');
      }
    });

    const url = new URL(window.location.href);
    url.searchParams.set('series', series);
    history.pushState({ path: url.href }, '', url.href);
  }

  document.addEventListener('DOMContentLoaded', function () {
    const seriesParam = decodeURIComponent(new URLSearchParams(window.location.search).get('series') || '');
    if (seriesParam) {
      showSeries(seriesParam)
    }
  });
</script>

{% assign seriesList = site.posts | map: "series" | uniq %}

<div id="home" class="content mt-4">
  <div class="flex flex-wrap items-baseline gap-y-2 text-gray-600">
    <span class="utility-label normal-case tracking-normal text-gray-800 mr-3">Series</span>
    <span class="flex flex-wrap gap-x-3 gap-y-1">
      <a class="cursor-pointer series-button utility-label normal-case tracking-normal text-gray-900" data-series="all"
        onclick="showSeries('all')">All</a>
      {% for series in seriesList %}
      <a class="cursor-pointer series-button utility-label normal-case tracking-normal"
        data-series="{{ series | downcase }}" onclick="showSeries('{{ series | downcase }}')">{{ series }}</a>
      {% endfor %}
    </span>
  </div>

  <div class="post-list mt-8">
    {% for post in site.posts %}
    <div class="post-row article" series="{{ post.series | downcase }}">
      <div class="post-date">{{ post.date | date: "%m-%d-%Y" }}</div>
      <div class="post-title overflow-hidden whitespace-nowrap">
        <a href="{{ post.url }}" class="block overflow-hidden whitespace-nowrap overflow-ellipsis text-gray-900">{{
          post.title }}</a>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
